  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

}\n  .case-card .case-period{transition:color .35s}\n  .case-card:hover .case-period{color:var(--accent,#B9933F)}\n  .rv{animation:riseIn .6s both cubic-bezier(.22,.61,.36,1)}\n  .stag>*{animation:riseIn .6s both cubic-bezier(.22,.61,.36,1)}\n  .stag>*:nth-child(2){animation-delay:.08s}\n  .stag>*:nth-child(3){animation-delay:.16s}\n  .stag>*:nth-child(4){animation-delay:.24s}\n  .stag>*:nth-child(5){animation-delay:.32s}\n  .stag>*:nth-child(6){animation-delay:.4s}\n  @media (prefers-reduced-motion:reduce){.rv,.stag>*{animation:none}.flt,.shm,.pls,.swp{animation:none!important}}\n  /* ---- Responsive (mobile) ---- */\n  @media (max-width:920px){\n    .g-hero{grid-template-columns:1fr!important;gap:36px!important;padding:48px 22px 40px!important}\n    .g-hero h1{font-size:37px!important}\n    .g-svc{grid-template-columns:1fr!important}\n    .g-comp{grid-template-columns:1fr!important;gap:32px!important}\n    .g-ref{grid-template-columns:1fr!important}\n    .g-meth{grid-template-columns:1fr 1fr!important}\n    .g-meth>*{border-right:none!important;border-bottom:1px solid rgba(255,255,255,.1)!important;padding:22px 12px 18px 0!important}\n    .g-cert{grid-template-columns:1fr 1fr!important}\n    .g-ctc{grid-template-columns:1fr!important;gap:30px!important;padding:36px 26px!important}\n    .nav-links a:not(.nav-cta){display:none!important}\n    section[id], section{scroll-margin-top:70px}\n    .sec-pad{padding-left:22px!important;padding-right:22px!important;padding-top:56px!important}\n    .g-stats{grid-template-columns:1fr 1fr!important;gap:26px 16px!important;padding:26px 22px!important}\n    .g-stats>div>div:first-child{font-size:30px!important}\n    h2{font-size:29px!important}\n    .flt{animation:none!important}\n  }\n  @media (max-width:560px){\n    .g-clus{grid-template-columns:1fr!important}\n    .g-cert{grid-template-columns:1fr!important}\n    .g-meth{grid-template-columns:1fr!important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent: {{ accen 180px;margin:0 auto;padding:80px 32px 64px;display:grid;grid-template-columns:1.25fr .9fr;gap:56px;align-items:center\">\n    <div style=\"animation:fadeUp .6s ease both\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#B9933F);font-weight:500;margin-bottom:22px\">Directeur de projet IT &amp; Télécoms · Paris<\u002Fdiv>\n      <h1 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:54px;line-height:1.03;letter-spacing:-.025em;color:#13151A;text-wrap:balance\">Vos projets IT &amp; télécoms méritent d'être livrés <span style=\"position:relative;display:inline-block\">à temps, et bien.<span class=\"swp\" style=\"position:absolute;left:0;right:0;bottom:2px;height:5px;background:var(--accent,#B9933F);opacity:.4;transform-origin:left;animation:sweepIn 1s .5s both cubic-bezier(.22,.61,.36,1)\"><\u002Fspan><\u002Fspan><\u002Fh1>\n      <p style=\"margin-top:24px;font-size:18.5px;line-height:1.6;color:#3C3E42;max-width:540px\">Directeur de projet certifié PMP, j'apporte aux PME et grands comptes <strong style=\"font-weight:600;color:#16181C\">un réseau de fournisseurs<\u002Fstrong>, <strong style=\"font-weight:600;color:#16181C\">une expertise technique IT &amp; télécoms<\u002Fstrong> et <strong style=\"font-weight:600;color:#16181C\">un pilotage sans surprise<\u002Fstrong> — du cadrage à la mise en production.<\u002Fp>\n      <div style=\"margin-top:34px;display:flex;flex-wrap:wrap;gap:14px;align-items:center\">\n        <a href=\"#contact\" style=\"text-decoration:none;background:var(--navy,#10243B);color:#fff;padding:14px 26px;border-radius:9px;font-weight:600;font-size:15.5px;display:inline-flex;align-items:center;gap:9px;transition:transform .3s cubic-bezier(.22,.61,.36,1),box-shadow .3s\" style-hover=\"transform:translateY(-3px);box-shadow:0 14px 28px -14px rgba(16,36,59,.55)\">Discuter d'un projet<span style=\"font-family: &quot;IBM Plex Mono&quot;, monospace;\">→<\u002Fspan><\u002Fa>\n        <a href=\"#references\" style=\"text-decoration:none;color:#16181C;padding:14px 22px;border-radius:9px;font-weight:600;font-size:15.5px;border:1px solid rgba(26,28,30,.22);transition:transform .3s cubic-bezier(.22,.61,.36,1),border-color .3s,background .3s\" style-hover=\"transform:translateY(-3px);border-color:var(--accent,#B9933F);background:rgba(185,147,63,.07)\">Voir les références<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"margin-top:30px;display:flex;flex-wrap:wrap;gap:10px\">\n        <sc-for list=\"{{ creds }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;color:#4A4B4E;background:rgba(185,147,63,.1);border:1px solid rgba(185,147,63,.32);padding:5px 11px;border-radius:6px\">{{ c }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flt\" style=\"position:relative;animation:floatCard 7s ease-in-out infinite\">\n      <div style=\"background:var(--navy,#10243B);border-radius:16px;padding:34px 32px;box-shadow:0 24px 48px -28px rgba(16,36,59,.5);overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:16px\">\n          <div style=\"flex:none;width:62px;height:62px;border-radius:14px;background:rgba(185,147,63,.16);border:1px solid rgba(185,147,63,.45);display:flex;flex-direction:column;align-items:center;justify-content:center\">\n            <span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;line-height:1;color:var(--accent,#B9933F)\">PMP<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:600;font-size:17px;color:#fff;line-height:1.2\">Certifié PMI · 2026<\u002Fdiv>\n            <div style=\"font-size:13px;color:#9FB0C2;margin-top:3px\">Project Management Professional<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:0;border-top:1px solid rgba(255,255,255,.12)\">\n          <sc-for list=\"{{ services }}\" as=\"hp\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.1)\">\n              <span style=\"flex:none;width:28px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent,#B9933F)\">{{ hp.num }}<\u002Fspan>\n              <span style=\"font-size:14.5px;color:#E4E9F0;font-weight:500;line-height:1.3\">{{ hp.title }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;display:flex;align-items:center;gap:9px\">\n          <span class=\"pls\" style=\"width:7px;height:7px;border-radius:50%;background:#3FB984;box-shadow:0 0 0 3px rgba(63,185,132,.18);animation:pulseDot 2.4s ease-in-out infinite\"><\u002Fspan>\n          <span style=\"font-size:13.5px;color:#C2CCDA\">Disponible · Paris &amp; Afrique (Travail à distance)<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STATS BAR -->\n  <section style=\"background:var(--navy,#10243B);color:#fff\">\n    <div class=\"g-stats\" style=\"max-width:1180px;margin:0 auto;padding:34px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"text-align:center\">\n          <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:38px;line-height:1;letter-spacing:-.02em;color:var(--accent,#B9933F)\">{{ s.val }}<\u002Fdiv>\n          <div style=\"margin-top:8px;font-size:13.5px;color:#BFCAD8;letter-spacing:.01em\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES -->\n  <section id=\"services\" class=\"sec-pad\" style=\"max-width:1180px;margin:0 auto;padding:88px 32px 24px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#B9933F);font-weight:500\">Ce que je livre<\u002Fdiv>\n    <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:38px;line-height:1.08;letter-spacing:-.02em;margin-top:14px;color:#13151A;max-width:660px;text-wrap:balance\">Trois expertises complémentaires, un seul interlocuteur<\u002Fh2>\n    <div class=\"stag g-svc\" style=\"margin-top:44px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px\">\n      <sc-for list=\"{{ services }}\" as=\"service\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid rgba(26,28,30,.1);border-radius:16px;padding:30px 28px;display:flex;flex-direction:column;box-shadow:0 1px 0 rgba(26,28,30,.03);transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .35s,border-color .35s\" style-hover=\"transform:translateY(-6px);box-shadow:0 22px 40px -26px rgba(16,36,59,.5);border-color:rgba(185,147,63,.5)\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent,#B9933F);font-weight:500\">{{ service.tag }}<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque';font-weight:600;font-size:21px;line-height:1.18;letter-spacing:-.01em;margin-top:14px;color:#16181C\">{{ service.title }}<\u002Fh3>\n          <p style=\"margin-top:12px;font-size:15px;line-height:1.55;color:#54565A\">{{ service.desc }}<\u002Fp>\n          <div style=\"margin-top:20px;padding-top:18px;border-top:1px solid rgba(26,28,30,.09);display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ service.points }}\" as=\"point\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                <span style=\"flex:none;width:6px;height:6px;border-radius:2px;background:var(--accent,#B9933F);margin-top:8px\"><\u002Fspan>\n                <span style=\"font-size:14.5px;line-height:1.45;color:#3C3E42\">{{ point }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMPETENCES -->\n  <section id=\"competences\" class=\"sec-pad\" style=\"max-width:1180px;margin:0 auto;padding:88px 32px 24px\">\n    <div class=\"rv\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#B9933F);font-weight:500\">Compétences<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:38px;line-height:1.08;letter-spacing:-.02em;margin-top:14px;color:#13151A;max-width:720px;text-wrap:balance\">Ce que j'apporte en tant que directeur de projet<\u002Fh2>\n      <p style=\"margin-top:18px;font-size:17.5px;line-height:1.6;color:#3C3E42;max-width:620px\">De l'analyse de données au pilotage stratégique : une conduite de projet rigoureuse, orientée résultats, qui aligne les équipes, maîtrise les risques et fluidifie la décision.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"g-comp\" style=\"margin-top:46px;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:stretch\">\n      <!-- Proficiency bars -->\n      <div class=\"stag\" style=\"display:flex;flex-direction:column;gap:22px;justify-content:space-between\">\n        <sc-for list=\"{{ skills }}\" as=\"sk\" hint-placeholder-count=\"6\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\">\n              <span style=\"font-family:'Bricolage Grotesque';font-weight:600;font-size:16px;color:#16181C\">{{ sk.label }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#8A887E\">{{ sk.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:8px;border-radius:6px;background:#E9E4D9;overflow:hidden\">\n              <div class=\"skl-bar\" style=\"position:relative;height:100%;width:{{ sk.pct }}%;border-radius:6px;background:linear-gradient(90deg,var(--navy,#10243B),var(--accent,#B9933F));overflow:hidden\"><span class=\"shm\" style=\"position:absolute;inset:0;width:45%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 3.2s ease-in-out infinite\"><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Clusters -->\n      <div class=\"stag g-clus\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:stretch\">\n        <sc-for list=\"{{ clusters }}\" as=\"cl\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid rgba(26,28,30,.1);border-radius:14px;padding:20px 20px;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .35s,border-color .35s\" style-hover=\"transform:translateY(-4px);box-shadow:0 18px 34px -24px rgba(16,36,59,.45);border-color:rgba(185,147,63,.45)\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:600;font-size:15.5px;color:#16181C;margin-bottom:14px\">{{ cl.title }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column\">\n              <sc-for list=\"{{ cl.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(26,28,30,.07);font-size:13.5px;color:#3C3E42\">\n                  <span style=\"flex:none;width:5px;height:5px;border-radius:2px;background:var(--accent,#B9933F)\"><\u002Fspan>\n                  <span>{{ it }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- REFERENCES -->\n  <section id=\"references\" class=\"sec-pad\" style=\"max-width:1180px;margin:0 auto;padding:84px 32px 24px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#B9933F);font-weight:500\">Références<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:38px;line-height:1.08;letter-spacing:-.02em;margin-top:14px;color:#13151A\">Des projets pilotés chez de grands comptes<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:14.5px;color:#6B6A63;max-width:300px;font-family:'IBM Plex Mono',monospace;line-height:1.5\">+ de 8 ans de coordination, suivi et pilotage de projets IT &amp; télécoms complexes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"stag g-ref\" style=\"margin-top:42px;display:grid;grid-template-columns:repeat(2,1fr);gap:22px\">\n      <sc-for list=\"{{ cases }}\" as=\"cs\" hint-placeholder-count=\"4\">\n        <div class=\"case-card\" style=\"background:#fff;border:1px solid rgba(26,28,30,.1);border-radius:16px;padding:30px 30px;display:flex;flex-direction:column;gap:18px;transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .35s,border-color .35s\" style-hover=\"transform:translateY(-6px);box-shadow:0 24px 44px -28px rgba(16,36,59,.5);border-color:rgba(185,147,63,.5)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:16px\">\n            <div>\n              <h3 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:23px;letter-spacing:-.015em;color:#16181C\">{{ cs.client }}<\u002Fh3>\n              <div style=\"font-size:14.5px;color:var(--accent,#B9933F);font-weight:600;margin-top:3px\">{{ cs.role }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"case-period\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8A887E;white-space:nowrap;padding-top:5px\">{{ cs.period }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:#4F5155\">{{ cs.scope }}<\u002Fp>\n          <div class=\"case-metric\" style=\"display:flex;align-items:baseline;gap:12px;padding:16px 18px;background:#FAF8F2;border:1px solid rgba(185,147,63,.22);border-radius:11px;transform-origin:left center\">\n            <span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:28px;letter-spacing:-.02em;color:var(--navy,#10243B)\">{{ cs.metricVal }}<\u002Fspan>\n            <span style=\"font-size:13.5px;color:#5A5C60;line-height:1.35\">{{ cs.metricLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:auto\">\n            <sc-for list=\"{{ cs.tags }}\" as=\"tag\" hint-placeholder-count=\"3\">\n              <span class=\"case-tag\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:#54565A;background:#F1EEE6;border:1px solid rgba(26,28,30,.1);padding:4px 10px;border-radius:6px\">{{ tag }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- METHODE -->\n  <section id=\"methode\" style=\"background:var(--navy,#10243B);color:#fff;margin-top:84px\">\n    <div class=\"sec-pad\" style=\"max-width:1180px;margin:0 auto;padding:80px 32px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#B9933F);font-weight:500\">Méthode<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:38px;line-height:1.08;letter-spacing:-.02em;margin-top:14px;max-width:620px;text-wrap:balance\">Une conduite de projet rigoureuse, du cadrage à l'amélioration continue<\u002Fh2>\n      <div class=\"stag g-meth\" style=\"margin-top:46px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid rgba(255,255,255,.16)\">\n otesque';font-weight:700;font-size:13px\">{{ cert.badge }}<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque';font-weight:600;font-size:16px;line-height:1.18;color:#16181C;margin-top:4px\">{{ cert.name }}<\u002Fh3>\n          <div style=\"margin-top:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7C7A70\">{{ cert.org }} · {{ cert.year }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"max-width:1180px;margin:60px auto 0;padding:0 32px 80px\">\n    <div class=\"g-ctc\" style=\"background:var(--navy,#10243B);border-radius:22px;padding:56px 52px;display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;box-shadow:0 30px 60px -36px rgba(16,36,59,.55)\">\n      <div>\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:36px;line-height:1.08;letter-spacing:-.02em;color:#fff;text-wrap:balance\">Un besoin en matériel, en compétences ou en pilotage ?<\u002Fh2>\n        <p style=\"margin-top:18px;font-size:17px;line-height:1.6;color:#C2CCDA;max-width:440px\">Décrivez votre projet ou votre appel d'offres : je reviens vers vous avec une proposition adaptée.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <a href=\"mailto:alec.degbegni@gmail.com\" style=\"text-decoration:none;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:16px 20px;color:#fff\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9FB0C2\">Email<\u002Fspan>\n          <span style=\"font-size:15.5px;font-weight:500\">alec.degbegni@gmail.com<\u002Fspan>\n        <\u002Fa>\n        <a href=\"tel:+33668540486\" style=\"text-decoration:none;display:flex;align-items:center;justify-content:spa s reconnues' },\n      ],\n      services: [\n        {\n          num: '01',\n          tag: '01 — Pilotage',\n          title: 'Gestion de projet IT & PMO',\n          desc: \"Cadrage, pilotage et gouvernance de projets complexes, en méthodes agiles et traditionnelles.\",\n          points: [\n            'Cadrage, planification & pilotage budgétaire',\n            'Gestion des risques & gouvernance (PMO)',\n            'Reporting, KPI & tableaux de bord Power BI',\n          ],\n        },\n        {\n          num: '02',\n          tag: '02 — Technique',\n          title: 'Expertise IT & Télécoms (Déploiement fibres, radio, etc.)',\n          desc: \"Ingénierie réseau et infrastructure, de l'étude au cahier des charges jusqu'à la mise en production.\",\n          points: [\n            'Réseaux, fibre & infrastructure télécom',\n            'Conception, intégration & migration de solutions',\n            'MCO, sécurité et conduite du changement',\n          ],\n        },\n        {\n          num: '03',\n          tag: '03 — Sourcing',\n          title: 'Réseau de fournisseurs IT & télécoms (matériel informatique)',\n          desc: 'Un réseau de contacts fournisseurs de confiance, qui équipent déjà de grands opérateurs comme Bouygues, Orange et SFR.',\n          points: [\n            'Fourniture directe de matériel certifié : postes, serveurs, équipements réseau',\n            'Négociation des meilleures conditions grâce à mon réseau de fournisseurs',\n            'Livraison, installation et mise en service clés en main',\n          ],\n        },\n      ],\n      cases: [\n        {\n          client: 'Bouygues Telecom',\n          role: 'PMO IT',\n          period: '2021 – 2023',\n          scope: \"Pilotage de 8 projets stratégiques et d'une équipe de 6 ingénieurs au centre de service, avec mise en place du reporting et des dashboards.\",\n          metricVal: '800 M€',\n          metricLabel: 'trajectoire financière suivie',\n          tags: ['PMO', 'Reporting', 'Dashboards'],\n        },\n        {\n          client: 'Compass Group France',\n          role: 'Chef de projet senior',\n          period: '2023 – Aujourd\\u2019hui',\n          scope: 'Pilotage des prestataires et éditeurs, professionnalisation des chefs de projet et déploiement d\\u2019actions d\\u2019amélioration continue.',\n          metricVal: '100 %',\n          metricLabel: 'suivi budgétaire des activités projets',\n          tags: ['Pilotage', 'Méthodo', 'Risques'],\n        },\n        {\n          client: 'Huawei Technologies',\n          role: 'Chef de projet déploiement',\n          period: '2019 – 2020',\n          scope: 'Suivi multi-périmètres de déploiement réseau, gestion des sous-traitants et des litiges, facturation et pilotage de la rentabilité client.',\n          metricVal: 'Process',\n          metricLabel: 'mise en place de process pour la validation des livrables',\n          tags: ['Réseau', 'Déploiement', 'Finance'],\n        },\n        {\n          client: 'Sogetrel',\n          role: 'Chef de projet technique',\n          period: '2017 – 2018',\n          scope: \"Production des dossiers d'étude et de réalisation fibre, gestion contractuelle, financière et technique des affaires.\",\n          metricVal: 'Études',\n          metricLabel: 'dossiers de déploiement livrés',\n          tags: ['Fibre', 'Études', 'Contrats'],\n        },\n      ],\n      steps: [\n        { n: '01', t: 'Cadrage', d: \"Recueil et formalisation du besoin métier, définition du périmètre, des coûts et des délais.\" },\n        { n: '02', t: 'Planification', d: 'Jalons, ressources et budget — méthodes agile et traditionnelle selon le contexte.' },\n        { n: '03', t: 'Pilotage', d: 'Suivi des risques, KPI et reporting, coordination des parties prenantes et prestataires.' },\n        { n: '04', t: 'Clôture', d: 'Recette, conduite du changement et amélioration continue après mise en production.' },\n      ],\n      certs: [\n        { badge: 'PMP', name: 'Project Management Professional', org: 'PMI', year: '2026' },\n        { badge: 'P2', name: 'PRINCE2 Foundation', org: 'AXELOS', year: '2021' },\n        { badge: 'ITIL', name: 'ITIL Foundation', org: 'AXELOS', year: '2022' },\n        { badge: 'SAFe', name: 'SAFe 6 Agilist', org: 'Scaled Agile', year: '2023' },\n        { badge: 'BI', name: 'Power BI Data Analyst', org: 'Microsoft', year: '2024' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
